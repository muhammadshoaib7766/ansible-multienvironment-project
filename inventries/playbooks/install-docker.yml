---
- name: Install and Configure Docker
  hosts: servers
  become: yes  # This tells Ansible to run these tasks with sudo privileges

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install necessary prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker's official GPG security key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add the official Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled on boot
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add the 'ubuntu' user to the 'docker' group
      user:
        name: ubuntu
        groups: docker
        append: yes
